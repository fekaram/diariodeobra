<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Diário de Obras - FKSA</title>

<style>
:root{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
body{
  margin:0;
  background:#0f1115;
  color:#eaeaea;
}
header{
  padding:20px;
  background:#14161c;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.headerBrand{
  font-weight:800;
  letter-spacing:.5px;
  font-size:18px;
}
.subBrand{
  font-size:12px;
  opacity:.6;
  margin-top:4px;
}
main{
  max-width:1000px;
  margin:auto;
  padding:20px;
}
.card{
  background:#1a1d24;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
  box-shadow:0 15px 40px rgba(0,0,0,.4);
}
label{
  font-size:13px;
  margin-top:12px;
  display:block;
}
input,textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:6px;
  background:#262a33;
  color:white;
}
textarea{ min-height:120px; }
button{
  margin-top:15px;
  padding:10px 16px;
  border-radius:10px;
  border:none;
  font-weight:600;
  cursor:pointer;
}
.primary{ background:#2d6cff; color:white; }
.secondary{ background:#333; color:white; }

.thumbGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
  margin-top:12px;
}
.thumbGrid img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  opacity:.5;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>

<header>
<div class="headerBrand">Diário de Obras FKSA</div>
<div class="subBrand">Arquitetura | Design</div>
</header>

<main>

<div class="card">

<label>Data</label>
<input type="date" id="dia"/>

<label>Obra / Projeto</label>
<input type="text" id="obra"/>

<label>Responsável</label>
<input type="text" id="responsavel"/>

<label>Fotos</label>
<input type="file" id="fotos" accept="image/*" capture="environment" multiple/>
<div id="thumbs" class="thumbGrid"></div>

<label>Diário / Relatório</label>
<textarea id="texto"></textarea>

<button class="primary" id="exportar">Exportar PDF</button>

</div>

</main>

<footer>FKSA ©</footer>

<img id="brandLogo" src="logo-fksa.jpg" style="display:none"/>

<script>
const { jsPDF } = window.jspdf;

const diaEl = document.getElementById("dia");
const obraEl = document.getElementById("obra");
const respEl = document.getElementById("responsavel");
const textoEl = document.getElementById("texto");
const fotosEl = document.getElementById("fotos");
const thumbsEl = document.getElementById("thumbs");

diaEl.value = new Date().toISOString().split("T")[0];

let fotos = [];

function pad(n){ return String(n).padStart(2,"0"); }
function formatDT(ts){
  const d=new Date(ts);
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function safeFilePart(s){
  return (s||"")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[\/\\]+/g,"-")
    .replace(/\s+/g,"_")
    .replace(/[^\w\-]+/g,"")
    .toLowerCase();
}

fotosEl.addEventListener("change", async ()=>{
  const files=[...fotosEl.files];
  for(const file of files){
    const ts=Date.now();
    const reader=new FileReader();
    reader.onload=()=>{
      fotos.push({preview:reader.result, ts});
      renderThumbs();
    };
    reader.readAsDataURL(file);
  }
});

function renderThumbs(){
  thumbsEl.innerHTML="";
  fotos.forEach(f=>{
    const img=document.createElement("img");
    img.src=f.preview;
    thumbsEl.appendChild(img);
  });
}

async function getLogo(){
  const img=document.getElementById("brandLogo");
  await new Promise(res=>{
    if(img.complete) return res();
    img.onload=res;
  });

  const canvas=document.createElement("canvas");
  canvas.width=img.naturalWidth;
  canvas.height=img.naturalHeight;
  const ctx=canvas.getContext("2d");
  ctx.imageSmoothingQuality="high";
  ctx.drawImage(img,0,0);

  return {
    dataUrl:canvas.toDataURL("image/png"),
    width:img.naturalWidth,
    height:img.naturalHeight
  };
}

function addHeader(doc,logo){
  const margin=15;
  const pageW=210;

  doc.setFont("helvetica","bold");
  doc.setFontSize(18);
  doc.text("Diário de Obras",margin,18);

  doc.setFont("helvetica","normal");
  doc.setFontSize(11);
  doc.text("FKSA Arquitetura | Design",margin,24);

  const maxW=45,maxH=18;
  const ratio=logo.width/logo.height;
  let w=maxW,h=w/ratio;
  if(h>maxH){ h=maxH; w=h*ratio; }

  doc.addImage(logo.dataUrl,"PNG",pageW-margin-w,10,w,h);

  doc.setDrawColor(180);
  doc.line(margin,30,pageW-margin,30);
}

function addFooter(doc,page,total){
  doc.setFontSize(9);
  doc.setTextColor(130);
  doc.text(`pág. ${page}/${total}`,200,287,{align:"right"});
  doc.setTextColor(0);
}

document.getElementById("exportar").addEventListener("click", async ()=>{

  const doc=new jsPDF({unit:"mm",format:"a4"});
  const logo=await getLogo();

  const pageW=210,pageH=297,margin=15;
  let y=36;

  addHeader(doc,logo);

  doc.setFontSize(11);
  doc.text(`Data: ${diaEl.value}`,margin,y); y+=6;
  doc.text(`Obra: ${obraEl.value}`,margin,y); y+=6;
  doc.text(`Responsável: ${respEl.value}`,margin,y); y+=10;

  doc.setFont("helvetica","bold");
  doc.text("Diário / Relatório",margin,y); y+=6;

  doc.setFont("helvetica","normal");
  const lines=doc.splitTextToSize(textoEl.value,pageW-margin*2);

  lines.forEach(line=>{
    if(y>pageH-20){
      doc.addPage();
      addHeader(doc,logo);
      y=36;
    }
    doc.text(line,margin,y);
    y+=5;
  });

  y+=8;

  const chunks=[];
  for(let i=0;i<fotos.length;i+=4){
    chunks.push(fotos.slice(i,i+4));
  }

  for(let p=0;p<chunks.length;p++){
    if(y>pageH-120 || p>0){
      doc.addPage();
      addHeader(doc,logo);
      y=36;
    }

    doc.setFont("helvetica","bold");
    doc.text("Fotos",margin,y);
    y+=8;

    const cellW=80;
    const cellH=55;
    const gap=10;

    chunks[p].forEach((photo,i)=>{
      const col=i%2;
      const row=Math.floor(i/2);
      const x=margin+col*(cellW+gap);
      const yImg=y+row*(cellH+gap);

      doc.setFontSize(8);
      doc.text(formatDT(photo.ts),x,yImg);
      doc.addImage(photo.preview,"JPEG",x,yImg+4,cellW,cellH-10);
    });
  }

  const total=doc.getNumberOfPages();
  for(let i=1;i<=total;i++){
    doc.setPage(i);
    addFooter(doc,i,total);
  }

  const obraPart=safeFilePart(obraEl.value||"obra");
  doc.save(`${diaEl.value}_diario_fksa_${obraPart}.pdf`);
});
</script>

</body>
</html>
