<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Diário de Obras - FKSA</title>

<style>
:root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
body { margin:0; background:#0b0c10; color:#e9eef5; }
header { padding:16px; border-bottom:1px solid rgba(255,255,255,.08); background:#111; }
.headerBrand { font-weight:900; }
main { padding:16px; max-width:1000px; margin:auto; }
.card { background:#16181d; padding:16px; border-radius:12px; margin-bottom:16px; }
label { display:block; margin-top:10px; font-size:13px; }
input, textarea { width:100%; padding:10px; border-radius:8px; border:none; margin-top:5px; background:#222; color:white; }
textarea { min-height:120px; }
button { margin-top:12px; padding:10px 14px; border-radius:8px; border:none; font-weight:bold; cursor:pointer; }
.primary { background:#2d6cff; color:white; }
.danger { background:#aa3333; color:white; }
.thumbGrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; margin-top:10px; }
.thumbWrap img { width:100%; height:120px; object-fit:cover; border-radius:8px; }
footer { text-align:center; font-size:12px; opacity:.6; padding:20px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>

<header>
<div class="headerBrand">Diário de Obras FKSA - Arquitetura | Design</div>
</header>

<main>

<div class="card">
<label>Dia</label>
<input id="dia" type="date">

<label>Obra / Projeto</label>
<input id="obra" type="text">

<label>Responsável</label>
<input id="responsavel" type="text">

<label>Fotos</label>
<input id="fotos" type="file" accept="image/*" capture="environment" multiple>

<div id="thumbs" class="thumbGrid"></div>

<label>Diário / Relatório</label>
<textarea id="texto"></textarea>

<button class="primary" id="btnSalvar">Salvar</button>
<button id="btnExportar">Exportar PDF</button>
</div>

</main>

<footer>FKSA • Diário de Obras</footer>

<img id="brandLogo" src="logo-fksa.jpg" style="display:none" />

<script>
const { jsPDF } = window.jspdf;

const diaEl = document.getElementById("dia");
const obraEl = document.getElementById("obra");
const respEl = document.getElementById("responsavel");
const fotosEl = document.getElementById("fotos");
const textoEl = document.getElementById("texto");
const thumbsEl = document.getElementById("thumbs");

let fotos = [];

function pad(n){ return String(n).padStart(2,"0"); }
function formatDT(ts){
  const d = new Date(ts);
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function safeFilePart(s){
  return (s||"")
  .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
  .replace(/[\/\\]+/g,"-")
  .replace(/\s+/g,"_")
  .replace(/[^\w\-]+/g,"")
  .toLowerCase();
}

fotosEl.addEventListener("change", async ()=>{
  const files = Array.from(fotosEl.files);
  for(const f of files){
    const ts = Date.now();
    const dataUrl = await new Promise(res=>{
      const r = new FileReader();
      r.onload = ()=>res(r.result);
      r.readAsDataURL(f);
    });
    fotos.push({blob:f, ts, preview:dataUrl});
  }
  renderThumbs();
});

function renderThumbs(){
  thumbsEl.innerHTML="";
  fotos.forEach(f=>{
    const img=document.createElement("img");
    img.src=f.preview;
    const div=document.createElement("div");
    div.className="thumbWrap";
    div.appendChild(img);
    thumbsEl.appendChild(div);
  });
}

async function getLogo(){
  const img=document.getElementById("brandLogo");
  await new Promise((res,rej)=>{
    if(img.complete) return res();
    img.onload=res;
    img.onerror=rej;
  });
  const canvas=document.createElement("canvas");
  canvas.width=img.naturalWidth;
  canvas.height=img.naturalHeight;
  canvas.getContext("2d").drawImage(img,0,0);
  return canvas.toDataURL("image/jpeg",0.9);
}

async function exportPDF(){
  const doc=new jsPDF({unit:"mm",format:"a4"});
  const pageW=210, pageH=297, margin=12;
  const contentW=pageW-margin*2;

  const logo=await getLogo();

  function addHeader(){
    doc.setFont("helvetica","bold");
    doc.setFontSize(14);
    doc.text("Diário de Obras FKSA - Arquitetura | Design",margin,16);
    doc.addImage(logo,"JPEG",pageW-margin-40,8,40,14);
    doc.setDrawColor(150);
    doc.line(margin,26,pageW-margin,26);
  }

  function addFooter(page,total){
    doc.setFontSize(9);
    doc.text(`pág. ${page}/${total}`,pageW-margin,pageH-10,{align:"right"});
  }

  addHeader();
  let y=34;

  doc.setFontSize(11);
  doc.text(`Data: ${diaEl.value}`,margin,y);
  y+=6;
  doc.text(`Obra: ${obraEl.value}`,margin,y);
  y+=6;
  doc.text(`Responsável: ${respEl.value}`,margin,y);
  y+=10;

  doc.setFont("helvetica","bold");
  doc.text("Diário / Relatório:",margin,y);
  y+=6;
  doc.setFont("helvetica","normal");

  const lines=doc.splitTextToSize(textoEl.value,contentW);
  lines.forEach(line=>{
    if(y>pageH-20){ doc.addPage(); addHeader(); y=34; }
    doc.text(line,margin,y);
    y+=5;
  });

  y+=8;

  // Fotos começam logo após texto
  const photoChunks=[];
  for(let i=0;i<fotos.length;i+=4){
    photoChunks.push(fotos.slice(i,i+4));
  }

  for(let p=0;p<photoChunks.length;p++){
    if(p>0 || y>pageH-120){
      doc.addPage();
      addHeader();
      y=34;
    }

    doc.setFont("helvetica","bold");
    doc.text("Fotos:",margin,y);
    y+=6;

    const cols=2, rows=2;
    const gapX=6, gapY=8;
    const cellW=(contentW-gapX)/2;
    const cellH=60;

    photoChunks[p].forEach((photo,i)=>{
      const col=i%2;
      const row=Math.floor(i/2);
      const x=margin+col*(cellW+gapX);
      const yImg=y+row*(cellH+gapY);

      doc.setFontSize(8);
      doc.text(formatDT(photo.ts),x,yImg);
      doc.addImage(photo.preview,"JPEG",x,yImg+4,cellW,cellH-10);
    });

    y+=rows*(cellH+gapY);
  }

  const totalPages=doc.getNumberOfPages();
  for(let i=1;i<=totalPages;i++){
    doc.setPage(i);
    addFooter(i,totalPages);
  }

  const obraPart=safeFilePart(obraEl.value||"obra");
  const fileName=`${diaEl.value}_diario_fksa_${obraPart}.pdf`;
  doc.save(fileName);
}

document.getElementById("btnExportar").addEventListener("click",exportPDF);

diaEl.value=new Date().toISOString().split("T")[0];
</script>

</body>
</html>
